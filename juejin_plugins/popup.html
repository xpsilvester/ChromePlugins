<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>掘金文章导出</title>
  <style>
    body { width: 300px; padding: 20px; font-family: Arial, sans-serif; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #0056b3; }
    #status { margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 4px; min-height: 40px; }
    .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    .progress-bar-fill { height: 100%; background: #007bff; transition: width 0.3s ease; }
    #exportBtn { margin-top: 15px; background: #28a745; }
    #exportBtn:hover { background: #218838; }
    #exportBtn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>掘金文章数据导出</h3>
  <button id="startBtn">开始爬取</button>
  <div id="status">点击开始爬取按钮</div>
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <button id="exportBtn" disabled>导出Excel</button>
  
  <script src="popup.js"></script>
</body>
</html>
